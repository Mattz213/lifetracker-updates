<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101418; --card:#181E24; --card2:#141A20; --line:#232B33;
    --text:#EDE9E0; --muted:#7E8894;
    --rel:#FF7E6B; --pur:#9F8CFF; --fre:#3ED6C4; --hea:#5FD78E;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Sora',system-ui,sans-serif; font-size:15px;
    display:flex; justify-content:center; min-height:100vh;
  }
  .app{width:100%; max-width:470px; padding:20px 16px 48px;}

  /* Header */
  .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .nav{display:flex; align-items:center; gap:6px;}
  .navbtn{
    background:var(--card); border:1px solid var(--line); color:var(--text);
    width:34px; height:34px; border-radius:10px; font-size:16px; cursor:pointer;
  }
  .navbtn:disabled{opacity:.3; cursor:default;}
  .datelabel{font-weight:600; font-size:15px; min-width:120px; text-align:center;}
  .streak{
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:7px 12px; font-size:13px; color:var(--muted);
  }
  .streak b{color:var(--text);}

  /* Day ring */
  .ringwrap{display:flex; justify-content:center; margin:18px 0 6px; position:relative;}
  .ringcenter{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; pointer-events:none;
  }
  .ringscore{font-size:34px; font-weight:700; line-height:1;}
  .ringmax{font-size:12px; color:var(--muted); margin-top:4px;}

  /* Pillar cards */
  .pillar{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:14px 14px 12px; margin-bottom:12px;
  }
  .prow{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .pname{font-weight:600; display:flex; align-items:center; gap:8px;}
  .dot{width:9px; height:9px; border-radius:50%;}
  .week{display:flex; gap:5px;}
  .wd{width:8px; height:8px; border-radius:3px; background:var(--card2); border:1px solid var(--line);}

  .levels{display:flex; gap:8px;}
  .lvl{
    flex:1; padding:10px 0; border-radius:11px; border:1px solid var(--line);
    background:var(--card2); color:var(--muted); font-family:inherit;
    font-size:14px; font-weight:600; cursor:pointer; transition:all .12s;
  }
  .lvl.active{color:#101418; border-color:transparent;}
  .legend{font-size:11.5px; color:var(--muted); margin:2px 2px 16px;}

  /* Note */
  .note{
    width:100%; background:var(--card); border:1px solid var(--line);
    border-radius:12px; color:var(--text); font-family:inherit; font-size:14px;
    padding:11px 13px; margin-top:4px;
  }
  .note::placeholder{color:var(--muted);}
  .note:focus{outline:none; border-color:#3A4552;}

  /* History */
  h3{font-size:13px; color:var(--muted); font-weight:600; letter-spacing:.04em;
     text-transform:uppercase; margin:26px 2px 10px;}
  .hist{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px;}
  .hrow{display:flex; align-items:center; gap:8px; margin-bottom:7px;}
  .hrow:last-child{margin-bottom:0;}
  .hlabel{width:26px; font-size:11px; color:var(--muted);}
  .hcells{display:flex; gap:4px; flex:1;}
  .hc{flex:1; aspect-ratio:1; border-radius:4px; background:var(--card2); border:1px solid var(--line);}
  .saved{font-size:11.5px; color:var(--muted); text-align:center; margin-top:18px; min-height:15px;}

  /* Chart */
  .chartbox{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px;}
  .chead{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .cnav{display:flex; align-items:center; gap:6px;}
  .cnav .navbtn{width:28px; height:28px; font-size:14px; border-radius:8px;}
  .clabel{font-size:13px; font-weight:600; min-width:96px; text-align:center;}
  .toggle{display:flex; background:var(--card2); border:1px solid var(--line); border-radius:9px; overflow:hidden;}
  .tbtn{background:none; border:none; color:var(--muted); font-family:inherit; font-size:12px;
        font-weight:600; padding:6px 12px; cursor:pointer;}
  .tbtn.on{background:#2A3440; color:var(--text);}
  .clegend{display:flex; gap:12px; flex-wrap:wrap; margin-top:10px;}
  .cleg{display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--muted);}
  .cleg .dot{width:8px; height:8px;}

  /* Settings + auth + update */
  .gear{background:var(--card); border:1px solid var(--line); color:var(--text);
    width:34px; height:34px; border-radius:10px; font-size:15px; cursor:pointer;}
  .overlay{position:fixed; inset:0; background:rgba(8,10,13,.72); display:none;
    justify-content:center; align-items:flex-start; padding:40px 16px; z-index:50;}
  .overlay.open{display:flex;}
  .panel{background:var(--card); border:1px solid var(--line); border-radius:18px;
    width:100%; max-width:420px; padding:20px; max-height:85vh; overflow-y:auto;}
  .panel h2{font-size:16px; margin:0 0 14px;}
  .panel h4{font-size:12px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.05em; margin:18px 0 8px;}
  .fld{width:100%; background:var(--card2); border:1px solid var(--line); border-radius:10px;
    color:var(--text); font-family:inherit; font-size:14px; padding:10px 12px; margin-bottom:8px;}
  .fld:focus{outline:none; border-color:#3A4552;}
  .btn{background:#2A3440; border:1px solid var(--line); color:var(--text); border-radius:10px;
    font-family:inherit; font-size:14px; font-weight:600; padding:10px 14px; cursor:pointer; margin-right:8px; margin-bottom:8px;}
  .btn.primary{background:var(--fre); color:#101418; border-color:transparent;}
  .btn.danger{color:var(--rel);}
  .msg{font-size:12.5px; color:var(--muted); min-height:16px; margin-top:4px;}
  .msg.err{color:var(--rel);}
  .msg.ok{color:var(--hea);}
  .closex{float:right; background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer;}
  .updatepill{position:fixed; bottom:18px; right:18px; z-index:40; display:none;
    background:var(--hea); color:#101418; border:none; border-radius:999px;
    font-family:inherit; font-weight:700; font-size:13px; padding:11px 18px; cursor:pointer;
    box-shadow:0 4px 18px rgba(0,0,0,.45);}
  .updatepill.show{display:block;}
  .verline{font-size:11px; color:var(--muted); margin-top:14px;}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="nav">
      <button class="navbtn" id="prev">‹</button>
      <div class="datelabel" id="dateLabel"></div>
      <button class="navbtn" id="next">›</button>
    </div>
    <div style="display:flex; gap:6px; align-items:center">
      <div class="streak">🔥 <b id="streak">0</b></div>
      <button class="gear" id="gear" title="Settings">⚙</button>
    </div>
  </div>

  <div class="ringwrap">
    <svg id="ring" width="190" height="190" viewBox="0 0 190 190"></svg>
    <div class="ringcenter">
      <div class="ringscore" id="score">0</div>
      <div class="ringmax">of 12</div>
    </div>
  </div>

  <div id="pillars"></div>
  <div class="legend">1 = touched it · 2 = solid work · 3 = big win</div>

  <input class="note" id="note" placeholder="One line about today (optional)" maxlength="120">

  <h3>Last 14 days</h3>
  <div class="hist" id="hist"></div>

  <h3>Graph</h3>
  <div class="chartbox">
    <div class="chead">
      <div class="cnav">
        <button class="navbtn" id="cprev">‹</button>
        <div class="clabel" id="clabel"></div>
        <button class="navbtn" id="cnext">›</button>
      </div>
      <div class="toggle">
        <button class="tbtn on" id="tmonth">Month</button>
        <button class="tbtn" id="tyear">Year</button>
      </div>
    </div>
    <svg id="chart" width="100%" viewBox="0 0 420 200" preserveAspectRatio="none" style="display:block;"></svg>
    <div class="clegend" id="clegend"></div>
  </div>

  <div class="saved" id="saved"></div>
</div>

<button class="updatepill" id="updBtn">⬇ Update available — install</button>

<div class="overlay" id="settings">
  <div class="panel">
    <button class="closex" id="closeSettings">✕</button>
    <h2>Settings</h2>

    <div id="setupSec">
      <h4>Cloud setup (one time)</h4>
      <input class="fld" id="cfgUrl" placeholder="Supabase URL (https://xxxx.supabase.co)">
      <input class="fld" id="cfgKey" placeholder="Supabase anon key">
      <input class="fld" id="cfgUpd" placeholder="Update URL (raw GitHub base)">
      <button class="btn primary" id="saveCfg">Save setup</button>
      <div class="msg" id="cfgMsg"></div>
    </div>

    <div id="authSec" style="display:none">
      <h4>Account</h4>
      <input class="fld" id="authEmail" type="email" placeholder="Email">
      <input class="fld" id="authPw" type="password" placeholder="Password (min 6 characters)">
      <button class="btn primary" id="btnLogin">Log in</button>
      <button class="btn" id="btnSignup">Create account</button>
      <div class="msg" id="authMsg"></div>
    </div>

    <div id="acctSec" style="display:none">
      <h4>Account</h4>
      <div class="msg ok" id="whoami"></div>
      <button class="btn" id="btnSync">Sync now</button>
      <button class="btn danger" id="btnLogout">Log out</button>
      <div class="msg" id="syncMsg"></div>
    </div>

    <div class="verline">Version <span id="verNum"></span> · <a href="#" id="editCfg" style="color:var(--muted)">edit cloud setup</a></div>
  </div>
</div>

<script>
const PILLARS = [
  {key:'r', name:'Relationships', color:'var(--rel)', hex:'#FF7E6B'},
  {key:'p', name:'Purpose',       color:'var(--pur)', hex:'#9F8CFF'},
  {key:'f', name:'Freedom',       color:'var(--fre)', hex:'#3ED6C4'},
  {key:'h', name:'Health',        color:'var(--hea)', hex:'#5FD78E'},
];
const KEY = 'life-tracker-days';
let days = {};          // { '2026-07-03': {r,p,f,h,note} }
let viewDate = today();

function today(){ const d=new Date(); return iso(d); }
function iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function shiftDate(dateStr, n){ const d=new Date(dateStr+'T12:00:00'); d.setDate(d.getDate()+n); return iso(d); }
function getDay(ds){ return days[ds] || {r:0,p:0,f:0,h:0,note:''}; }
function total(ds){ const d=getDay(ds); return d.r+d.p+d.f+d.h; }

// ---------- storage ----------
async function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) days = JSON.parse(raw);
  }catch(e){ days = {}; }
  render();
}
let saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      localStorage.setItem(KEY, JSON.stringify(days));
      flashSaved();
      schedulePush();
    }catch(e){
      document.getElementById('saved').textContent = 'Could not save — check connection';
    }
  }, 400);
}
function flashSaved(){
  const el=document.getElementById('saved');
  el.textContent='Saved';
  setTimeout(()=>{ if(el.textContent==='Saved') el.textContent=''; }, 1500);
}

// ---------- actions ----------
function setLevel(pk, lvl){
  const d = {...getDay(viewDate)};
  d[pk] = (d[pk]===lvl) ? 0 : lvl;   // tap same level again = clear
  d._u = Date.now();
  days[viewDate]=d;
  save(); render();
}
function setNote(v){
  const d = {...getDay(viewDate)}; d.note=v; d._u=Date.now(); days[viewDate]=d; save();
}

// ---------- streak ----------
function calcStreak(){
  let s=0, ds=today();
  if(total(ds)===0) ds=shiftDate(ds,-1);      // today not logged yet doesn't break streak
  while(total(ds)>0){ s++; ds=shiftDate(ds,-1); }
  return s;
}

// ---------- render ----------
function render(){
  const d = getDay(viewDate);
  const isToday = viewDate===today();

  // header
  const dt=new Date(viewDate+'T12:00:00');
  document.getElementById('dateLabel').textContent =
    isToday ? 'Today' : dt.toLocaleDateString('en-GB',{weekday:'short', day:'numeric', month:'short'});
  document.getElementById('next').disabled = isToday;
  document.getElementById('streak').innerHTML = '🔥 <b>'+calcStreak()+'</b>';
  document.getElementById('score').textContent = total(viewDate);

  // ring: 4 arcs, 90° each minus gap
  const svg=document.getElementById('ring');
  let arcs='';
  const cx=95, cy=95, rr=80, gap=10, span=90-gap;
  PILLARS.forEach((p,i)=>{
    const start=-90 + i*90 + gap/2;
    arcs += arcPath(cx,cy,rr,start,start+span,'var(--line)',10,1);
    const frac=d[p.key]/3;
    if(frac>0) arcs += arcPath(cx,cy,rr,start,start+span*frac,p.hex,10,1);
  });
  svg.innerHTML=arcs;

  // pillars
  const wrap=document.getElementById('pillars');
  wrap.innerHTML = PILLARS.map(p=>{
    const lvl=d[p.key];
    const week = Array.from({length:7},(_,i)=>{
      const ds=shiftDate(viewDate,-(6-i));
      const v=getDay(ds)[p.key];
      const op = v===0 ? 0 : 0.3+v*0.23;
      return '<div class="wd" style="'+(v>0?('background:'+p.hex+'; opacity:'+op+'; border-color:transparent;'):'')+'"></div>';
    }).join('');
    const btns=[0,1,2,3].map(l=>{
      const act=l===lvl && l>0;
      return '<button class="lvl'+(act?' active':'')+'" style="'+(act?('background:'+p.hex+';'):'')+'" onclick="setLevel(\''+p.key+'\','+l+')">'+(l===0?'–':l)+'</button>';
    }).join('');
    return '<div class="pillar">'+
      '<div class="prow"><div class="pname"><span class="dot" style="background:'+p.hex+'"></span>'+p.name+'</div>'+
      '<div class="week">'+week+'</div></div>'+
      '<div class="levels">'+btns+'</div></div>';
  }).join('');

  // note
  const note=document.getElementById('note');
  if(note.value!==d.note) note.value=d.note||'';

  // history 14 days
  const hist=document.getElementById('hist');
  hist.innerHTML = PILLARS.map(p=>{
    const cells=Array.from({length:14},(_,i)=>{
      const ds=shiftDate(today(),-(13-i));
      const v=getDay(ds)[p.key];
      const op = v===0 ? 0 : 0.3+v*0.23;
      return '<div class="hc" style="'+(v>0?('background:'+p.hex+'; opacity:'+op+'; border-color:transparent;'):'')+'"></div>';
    }).join('');
    return '<div class="hrow"><div class="hlabel">'+p.name.slice(0,3)+'</div><div class="hcells">'+cells+'</div></div>';
  }).join('');

  renderChart();
}

function arcPath(cx,cy,r,a1,a2,color,w,rounded){
  const rad=a=>a*Math.PI/180;
  const x1=cx+r*Math.cos(rad(a1)), y1=cy+r*Math.sin(rad(a1));
  const x2=cx+r*Math.cos(rad(a2)), y2=cy+r*Math.sin(rad(a2));
  const large=(a2-a1)>180?1:0;
  return '<path d="M '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+
    '" fill="none" stroke="'+color+'" stroke-width="'+w+'" stroke-linecap="round"/>';
}

// ---------- chart ----------
let chartMode='month';
let chartMonth=viewDate.slice(0,7);            // 'YYYY-MM'
let chartYear=parseInt(viewDate.slice(0,4));   // 2026

function daysInMonth(ym){ const [y,m]=ym.split('-').map(Number); return new Date(y,m,0).getDate(); }
function shiftMonth(ym,n){ const [y,m]=ym.split('-').map(Number); const d=new Date(y,m-1+n,1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

function renderChart(){
  const svg=document.getElementById('chart');
  const label=document.getElementById('clabel');
  const W=420,H=200, padL=26,padR=8,padT=12,padB=22;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  let out='';

  let series, xLabels, yMax;
  if(chartMode==='month'){
    const n=daysInMonth(chartMonth);
    yMax=3;
    series=PILLARS.map(p=>Array.from({length:n},(_,i)=>{
      const ds=chartMonth+'-'+String(i+1).padStart(2,'0');
      return days[ds] ? days[ds][p.key] : null;   // null = not logged
    }));
    xLabels=[[0,'1'],[Math.floor(n/2),String(Math.floor(n/2)+1)],[n-1,String(n)]];
    const [y,m]=chartMonth.split('-').map(Number);
    label.textContent=new Date(y,m-1,1).toLocaleDateString('en-GB',{month:'short',year:'numeric'});
  }else{
    yMax=93; // theoretical monthly max (31 × 3)
    series=PILLARS.map(p=>Array.from({length:12},(_,mi)=>{
      const ym=chartYear+'-'+String(mi+1).padStart(2,'0');
      let sum=0, any=false;
      for(let d=1; d<=daysInMonth(ym); d++){
        const ds=ym+'-'+String(d).padStart(2,'0');
        if(days[ds]){ sum+=days[ds][p.key]; any=true; }
      }
      return any?sum:null;
    }));
    // scale yMax to data so lines aren't flat
    const flat=series.flat().filter(v=>v!==null);
    yMax=Math.max(10, ...(flat.length?flat:[10]));
    xLabels=[[0,'Jan'],[3,'Apr'],[6,'Jul'],[9,'Oct'],[11,'Dec']];
    label.textContent=String(chartYear);
  }

  const n=series[0].length;
  const x=i=> padL + (n===1?plotW/2 : i*(plotW/(n-1)));
  const y=v=> padT + plotH - (v/yMax)*plotH;

  // gridlines
  const gridVals = chartMode==='month' ? [0,1,2,3] : [0, Math.round(yMax/2), yMax];
  gridVals.forEach(g=>{
    out+='<line x1="'+padL+'" y1="'+y(g)+'" x2="'+(W-padR)+'" y2="'+y(g)+'" stroke="var(--line)" stroke-width="1"/>';
    out+='<text x="'+(padL-6)+'" y="'+(y(g)+3)+'" fill="var(--muted)" font-size="9" text-anchor="end" font-family="Sora">'+g+'</text>';
  });
  xLabels.forEach(([i,t])=>{
    out+='<text x="'+x(i)+'" y="'+(H-6)+'" fill="var(--muted)" font-size="9" text-anchor="middle" font-family="Sora">'+t+'</text>';
  });

  // grouped bars: 4 thin pillars side by side per slot, rounded tops
  const slotW = plotW/n;
  const groupW = slotW*0.78;
  const gapW = groupW*0.10;
  const barW = (groupW - 3*gapW)/4;
  const bottom = padT+plotH;
  function topRoundedBar(bx,by,w,h,color){
    const r=Math.min(w*0.45, h);
    return '<path d="M '+bx+' '+(by+h)+
      ' L '+bx+' '+(by+r)+
      ' Q '+bx+' '+by+' '+(bx+r)+' '+by+
      ' L '+(bx+w-r)+' '+by+
      ' Q '+(bx+w)+' '+by+' '+(bx+w)+' '+(by+r)+
      ' L '+(bx+w)+' '+(by+h)+' Z" fill="'+color+'"/>';
  }
  for(let i=0; i<n; i++){
    const gx = x(i)-groupW/2;
    series.forEach((vals,si)=>{
      const v=vals[i];
      if(v===null || v<=0) return;
      const bx = gx + si*(barW+gapW);
      const by = y(v), bh = bottom-by;
      out+=topRoundedBar(bx,by,barW,bh,PILLARS[si].hex);
    });
  }

  svg.innerHTML=out;
  document.getElementById('clegend').innerHTML=PILLARS.map(p=>
    '<div class="cleg"><span class="dot" style="background:'+p.hex+'"></span>'+p.name+'</div>').join('');
}

document.getElementById('cprev').onclick=()=>{
  if(chartMode==='month') chartMonth=shiftMonth(chartMonth,-1); else chartYear--;
  renderChart();
};
document.getElementById('cnext').onclick=()=>{
  if(chartMode==='month') chartMonth=shiftMonth(chartMonth,1); else chartYear++;
  renderChart();
};
document.getElementById('tmonth').onclick=()=>{
  chartMode='month';
  document.getElementById('tmonth').classList.add('on');
  document.getElementById('tyear').classList.remove('on');
  renderChart();
};
document.getElementById('tyear').onclick=()=>{
  chartMode='year';
  document.getElementById('tyear').classList.add('on');
  document.getElementById('tmonth').classList.remove('on');
  renderChart();
};

document.getElementById('prev').onclick=()=>{ viewDate=shiftDate(viewDate,-1); render(); };
document.getElementById('next').onclick=()=>{ if(viewDate!==today()){ viewDate=shiftDate(viewDate,1); render(); } };
document.getElementById('note').addEventListener('input', e=>setNote(e.target.value));

// ================= CLOUD SYNC + ACCOUNTS + UPDATES =================
const APP_VERSION='1.4.0';
document.getElementById('verNum').textContent=APP_VERSION;

const DEFAULT_CONFIG={
  url:'https://wdjqcgkzlajlpotwlkdm.supabase.co',
  key:'sb_publishable_jGnfjoa_7Y_lnBhU7MsHCQ_HXtDPher',
  update:'https://raw.githubusercontent.com/Mattz213/lifetracker-updates/main'
};
function cfg(){
  try{
    const c=JSON.parse(localStorage.getItem('lt-config')||'{}');
    return {...DEFAULT_CONFIG, ...c};
  }catch(e){ return {...DEFAULT_CONFIG}; }
}
function setCfg(c){ localStorage.setItem('lt-config',JSON.stringify(c)); }
function sess(){ try{return JSON.parse(localStorage.getItem('lt-session')||'null')}catch(e){return null} }
function setSess(x){ x?localStorage.setItem('lt-session',JSON.stringify(x)):localStorage.removeItem('lt-session'); }

async function sb(path,opts={},auth=true){
  const c=cfg(); if(!c.url||!c.key) throw new Error('Cloud not set up');
  const h={'apikey':c.key,'Content-Type':'application/json',...(opts.headers||{})};
  const s=sess(); if(auth&&s) h['Authorization']='Bearer '+s.access_token;
  return fetch(c.url.replace(/\/+$/,'')+path,{...opts,headers:h});
}

async function signUp(email,pw){
  const r=await sb('/auth/v1/signup',{method:'POST',body:JSON.stringify({email,password:pw})},false);
  const j=await r.json();
  if(!r.ok) throw new Error(j.msg||j.error_description||'Signup failed');
  if(j.access_token) setSess(j);
  return j;
}
async function signIn(email,pw){
  const r=await sb('/auth/v1/token?grant_type=password',{method:'POST',body:JSON.stringify({email,password:pw})},false);
  const j=await r.json();
  if(!r.ok) throw new Error(j.error_description||j.msg||'Login failed');
  setSess(j); return j;
}
async function refreshSess(){
  const s=sess(); if(!s||!s.refresh_token) return false;
  try{
    const r=await sb('/auth/v1/token?grant_type=refresh_token',{method:'POST',body:JSON.stringify({refresh_token:s.refresh_token})},false);
    if(!r.ok){ setSess(null); return false; }
    setSess(await r.json()); return true;
  }catch(e){ return false; }
}
function userId(){ const s=sess(); return s&&s.user?s.user.id:null; }
function userEmail(){ const s=sess(); return s&&s.user?s.user.email:''; }

function mergeDays(remote){
  let changed=false;
  for(const k in remote){
    const r=remote[k], l=days[k];
    if(!l || (r._u||0)>(l._u||0)){ days[k]=r; changed=true; }
  }
  if(changed){ localStorage.setItem(KEY,JSON.stringify(days)); render(); }
}
async function pullRemote(){
  if(!userId()) return;
  let r=await sb('/rest/v1/tracker_data?select=data&user_id=eq.'+userId());
  if(r.status===401){ if(await refreshSess()) r=await sb('/rest/v1/tracker_data?select=data&user_id=eq.'+userId()); }
  if(!r.ok) throw new Error('Pull failed');
  const rows=await r.json();
  if(rows.length) mergeDays(rows[0].data||{});
}
async function pushRemote(){
  if(!userId()) return;
  const body=JSON.stringify([{user_id:userId(),data:days,updated_at:new Date().toISOString()}]);
  let r=await sb('/rest/v1/tracker_data',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body});
  if(r.status===401){ if(await refreshSess()) r=await sb('/rest/v1/tracker_data',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body}); }
  if(!r.ok) throw new Error('Push failed');
}
let pushTimer=null;
function schedulePush(){
  if(!userId()) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>pushRemote().catch(()=>{}),2500);
}

// ---------- settings UI ----------
const $=id=>document.getElementById(id);
function openSettings(){ $('settings').classList.add('open'); refreshSettingsUI(); }
function refreshSettingsUI(){
  const c=cfg(), logged=!!userId();
  $('setupSec').style.display=(c.url&&c.key)?'none':'block';
  $('authSec').style.display=(c.url&&c.key&&!logged)?'block':'none';
  $('acctSec').style.display=logged?'block':'none';
  if(logged) $('whoami').textContent='Logged in as '+userEmail();
  $('cfgUrl').value=c.url||''; $('cfgKey').value=c.key||''; $('cfgUpd').value=c.update||'';
}
$('gear').onclick=openSettings;
$('closeSettings').onclick=()=>$('settings').classList.remove('open');
$('settings').addEventListener('click',e=>{ if(e.target.id==='settings') $('settings').classList.remove('open'); });
$('editCfg').onclick=e=>{ e.preventDefault(); $('setupSec').style.display='block'; };
$('saveCfg').onclick=()=>{
  const c={url:$('cfgUrl').value.trim(), key:$('cfgKey').value.trim(), update:$('cfgUpd').value.trim()};
  if(!c.url||!c.key){ $('cfgMsg').textContent='URL and anon key are required'; $('cfgMsg').className='msg err'; return; }
  setCfg(c);
  $('cfgMsg').textContent='Saved'; $('cfgMsg').className='msg ok';
  refreshSettingsUI(); checkUpdate();
};
$('btnLogin').onclick=async()=>{
  $('authMsg').className='msg'; $('authMsg').textContent='Logging in…';
  try{
    await signIn($('authEmail').value.trim(), $('authPw').value);
    $('authMsg').textContent='';
    refreshSettingsUI();
    await pullRemote(); await pushRemote();
    $('syncMsg').textContent='Synced'; $('syncMsg').className='msg ok';
  }catch(e){ $('authMsg').textContent=e.message; $('authMsg').className='msg err'; }
};
$('btnSignup').onclick=async()=>{
  $('authMsg').className='msg'; $('authMsg').textContent='Creating account…';
  try{
    const j=await signUp($('authEmail').value.trim(), $('authPw').value);
    if(j.access_token){
      refreshSettingsUI(); await pushRemote();
      $('syncMsg').textContent='Account created & synced'; $('syncMsg').className='msg ok';
    }else{
      $('authMsg').textContent='Account created — check your email to confirm, then log in.'; $('authMsg').className='msg ok';
    }
  }catch(e){ $('authMsg').textContent=e.message; $('authMsg').className='msg err'; }
};
$('btnLogout').onclick=()=>{ setSess(null); refreshSettingsUI(); };
$('btnSync').onclick=async()=>{
  $('syncMsg').textContent='Syncing…'; $('syncMsg').className='msg';
  try{ await pullRemote(); await pushRemote(); $('syncMsg').textContent='Synced ✓'; $('syncMsg').className='msg ok'; }
  catch(e){ $('syncMsg').textContent=e.message; $('syncMsg').className='msg err'; }
};

// ---------- updates ----------
function cmpVer(a,b){
  const A=a.split('.').map(Number), B=b.split('.').map(Number);
  for(let i=0;i<3;i++){ if((A[i]||0)!==(B[i]||0)) return (A[i]||0)-(B[i]||0); }
  return 0;
}
let updateInfo=null;
async function checkUpdate(){
  const c=cfg(); if(!c.update) return;
  try{
    const base=c.update.replace(/\/+$/,'');
    const r=await fetch(base+'/version.json?t='+Date.now());
    if(!r.ok) return;
    const v=await r.json();
    if(v.version && cmpVer(v.version,APP_VERSION)>0){
      updateInfo={...v, base};
      $('updBtn').textContent='⬇ Update to v'+v.version;
      $('updBtn').classList.add('show');
    }
  }catch(e){}
}
$('updBtn').onclick=async()=>{
  if(!updateInfo) return;
  $('updBtn').textContent='Updating…';
  try{
    const r=await fetch(updateInfo.base+'/index.html?t='+Date.now());
    if(!r.ok) throw new Error('download failed');
    const html=await r.text();
    if(window.lifetracker && window.lifetracker.applyUpdate){
      await window.lifetracker.applyUpdate(html);   // desktop app: swap + reload
    }else{
      // browser fallback: download the new file
      const blob=new Blob([html],{type:'text/html'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob); a.download='life-tracker-standalone.html'; a.click();
      $('updBtn').textContent='Downloaded — replace your old file';
    }
  }catch(e){ $('updBtn').textContent='Update failed — try again'; }
};

// ---------- startup ----------
(async()=>{
  if(sess()){ await refreshSess(); try{ await pullRemote(); }catch(e){} }
  checkUpdate();
  setInterval(checkUpdate, 6*60*60*1000);
})();

load();
</script>
